  replicas: 1
  selector:
    matchLabels: { app: notification-service }
  template:
    metadata:
      labels: { app: notification-service }
    spec:
      containers:
        - name: notification-service
          image: YOUR_ECR_ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/shopwave/notification-service:latest
