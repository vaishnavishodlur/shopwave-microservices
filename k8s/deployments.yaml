---
# ── Namespace ────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: shopwave
  labels: { env: dev }

---
# ── Auth Service ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: shopwave
spec:
  replicas: 2
  selector:
    matchLabels: { app: auth-service }
  template:
    metadata:
      labels: { app: auth-service }
    spec:
      containers:
        - name: auth-service
          image: YOUR_ECR_ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/shopwave/auth-service:latest
          ports: [{ containerPort: 3001 }]
          env:
            - { name: DB_HOST,     value: auth-db-service }
            - { name: DB_PORT,     value: "5432" }
            - { name: DB_NAME,     value: authdb }
            - { name: DB_USER,     value: postgres }
            - { name: DB_PASSWORD, valueFrom: { secretKeyRef: { name: shopwave-secrets, key: db-password } } }
            - { name: REDIS_URL,   value: redis://redis-service:6379 }
            - { name: JWT_SECRET,  valueFrom: { secretKeyRef: { name: shopwave-secrets, key: jwt-secret } } }
            - { name: PORT,        value: "3001" }
          livenessProbe:  { httpGet: { path: /health, port: 3001 }, initialDelaySeconds: 20 }
          readinessProbe: { httpGet: { path: /health, port: 3001 }, initialDelaySeconds: 10 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: shopwave
spec:
  selector: { app: auth-service }
  ports: [{ port: 3001, targetPort: 3001 }]

---
# ── Product Service ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: shopwave
spec:
  replicas: 2
  selector:
    matchLabels: { app: product-service }
  template:
    metadata:
      labels: { app: product-service }
    spec:
      containers:
        - name: product-service
          image: YOUR_ECR_ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/shopwave/product-service:latest
          ports: [{ containerPort: 3002 }]
          env:
            - { name: MONGO_URI,  value: mongodb://mongodb-service:27017 }
            - { name: DB_NAME,    value: productsdb }
            - { name: REDIS_URL,  value: redis://redis-service:6379 }
            - { name: PORT,       value: "3002" }
          livenessProbe:  { httpGet: { path: /health, port: 3002 }, initialDelaySeconds: 20 }
          readinessProbe: { httpGet: { path: /health, port: 3002 }, initialDelaySeconds: 10 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: shopwave
spec:
  selector: { app: product-service }
  ports: [{ port: 3002, targetPort: 3002 }]

