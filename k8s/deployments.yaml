---
# ── API Gateway ───────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: shopwave
spec:
  replicas: 2
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      containers:
        - name: api-gateway
          image: YOUR_ECR_ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/shopwave/api-gateway:latest
          ports: [{ containerPort: 80 }]
          livenessProbe:  { httpGet: { path: /health, port: 80 }, initialDelaySeconds: 10 }
          readinessProbe: { httpGet: { path: /health, port: 80 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 50m,  memory: 64Mi }
            limits:   { cpu: 200m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: shopwave
spec:
  type: LoadBalancer
  selector: { app: api-gateway }
  ports: [{ port: 80, targetPort: 80 }]

---
# ── Frontend ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shopwave
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: YOUR_ECR_ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/shopwave/frontend:latest
          ports: [{ containerPort: 3000 }]
          resources:
            requests: { cpu: 50m,  memory: 64Mi }
            limits:   { cpu: 200m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: shopwave
spec:
  selector: { app: frontend }
  ports: [{ port: 3000, targetPort: 3000 }]

---
# ── Secrets placeholder ───────────────────────────────────────────
# Create with: kubectl create secret generic shopwave-secrets \
#   --from-literal=db-password=YourSecurePassword \
#   --from-literal=jwt-secret=YourJWTSecret \
#   -n shopwave
apiVersion: v1
kind: Secret
metadata:
  name: shopwave-secrets
  namespace: shopwave
type: Opaque
stringData:
  db-password: "changeme"
  jwt-secret: "shopwave-jwt-secret-changeme"

---
# ── HPA for key services ──────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: shopwave
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: auth-service }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-service-hpa
  namespace: shopwave
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: product-service }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
